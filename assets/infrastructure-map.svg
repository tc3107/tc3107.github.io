<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="850" viewBox="0 0 1100 850" role="img" aria-labelledby="title desc">
  <title id="title">Turning problems into working systems</title>
  <desc id="desc">A clean portfolio overview showing practical technical work across infrastructure, software, networking and cloud, support, and operations.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f8fc"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#17202a" flood-opacity="0.08"/>
    </filter>

    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#17202a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="1100" height="850" fill="#ffffff"/>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="50" y="46" width="1000" height="758" rx="28" fill="url(#bg)" stroke="#d9e2ec" stroke-width="2.2" filter="url(#shadow)"/>

    <text x="94" y="112" font-size="15" font-weight="800" letter-spacing="1.6" fill="#24735c">PRACTICAL TECHNICAL WORK</text>
    <text x="94" y="163" font-size="40" font-weight="850" fill="#17202a">Turning problems into working systems</text>
    <text x="94" y="199" font-size="19" fill="#5b6878">A concise view of how I work across software, systems, and operations.</text>

    <rect x="94" y="246" width="912" height="54" rx="14" fill="#edf3f8" stroke="#d9e2ec" stroke-width="2"/>
    <text x="152" y="280" font-size="14" font-weight="800" letter-spacing="0.8" fill="#5b6878">AREA</text>
    <text x="430" y="280" font-size="14" font-weight="800" letter-spacing="0.8" fill="#5b6878">SCOPE</text>

    <!-- Row 1: Infrastructure -->
    <g>
      <rect x="94" y="326" width="912" height="80" rx="14" fill="#ffffff" stroke="#d9e2ec" stroke-width="1.8"/>
      <circle cx="139" cy="366" r="25" fill="#edf4ff" stroke="#d5e5ff" stroke-width="1.5" filter="url(#smallShadow)"/>
      <!-- minimal server rack -->
      <g fill="none" stroke="#1f6feb" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
        <rect x="124" y="350" width="30" height="12" rx="2.5"/>
        <rect x="124" y="370" width="30" height="12" rx="2.5"/>
        <path d="M130 356h.1M130 376h.1"/>
        <path d="M144 356h5M144 376h5"/>
      </g>
      <text x="184" y="374" font-size="26" font-weight="800" fill="#17202a">Infrastructure</text>
      <text x="430" y="374" font-size="22" fill="#17202a">Servers, Linux services, storage, backups.</text>
    </g>

    <!-- Row 2: Software -->
    <g>
      <rect x="94" y="420" width="912" height="80" rx="14" fill="#ffffff" stroke="#d9e2ec" stroke-width="1.8"/>
      <circle cx="139" cy="460" r="25" fill="#edf8f4" stroke="#d8efe7" stroke-width="1.5" filter="url(#smallShadow)"/>
      <!-- terminal/code window -->
      <g fill="none" stroke="#24735c" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
        <rect x="122" y="444" width="34" height="32" rx="4"/>
        <path d="M122 452h34"/>
        <path d="M132 462l-6 6 6 6"/>
        <path d="M142 462l6 6-6 6"/>
      </g>
      <text x="184" y="468" font-size="26" font-weight="800" fill="#17202a">Software</text>
      <text x="430" y="468" font-size="22" fill="#17202a">Scripts, internal tools, Android apps.</text>
    </g>

    <!-- Row 3: Networking & Cloud -->
    <g>
      <rect x="94" y="514" width="912" height="80" rx="14" fill="#ffffff" stroke="#d9e2ec" stroke-width="1.8"/>
      <circle cx="139" cy="554" r="25" fill="#f5efff" stroke="#e6d8ff" stroke-width="1.5" filter="url(#smallShadow)"/>
      <!-- network nodes, not cloud doodle -->
      <g fill="none" stroke="#7c3aed" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="139" cy="554" r="6"/>
        <circle cx="124" cy="541" r="5"/>
        <circle cx="155" cy="541" r="5"/>
        <circle cx="126" cy="570" r="5"/>
        <circle cx="154" cy="570" r="5"/>
        <path d="M134 550l-7-6M144 550l8-6M134 559l-6 8M145 559l7 8"/>
      </g>
      <text x="184" y="548" font-size="26" font-weight="800" fill="#17202a">Networking</text>
      <text x="184" y="579" font-size="26" font-weight="800" fill="#17202a">&amp; Cloud</text>
      <text x="430" y="562" font-size="22" fill="#17202a">DNS, Cloudflare, domains, hosted systems.</text>
    </g>

    <!-- Row 4: Support -->
    <g>
      <rect x="94" y="608" width="912" height="80" rx="14" fill="#ffffff" stroke="#d9e2ec" stroke-width="1.8"/>
      <circle cx="139" cy="648" r="25" fill="#fff6e6" stroke="#f4dfb7" stroke-width="1.5" filter="url(#smallShadow)"/>
      <!-- support/chat bubble + check, less headset -->
      <g fill="none" stroke="#b7791f" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M122 638c0-7 6-12 13-12h10c8 0 14 5 14 12v8c0 7-6 12-14 12h-10l-11 10v-10h-2c-7 0-12-5-12-12z"/>
        <path d="M132 644l5 5 11-12"/>
      </g>
      <text x="184" y="656" font-size="26" font-weight="800" fill="#17202a">Support</text>
      <text x="430" y="656" font-size="22" fill="#17202a">Users, devices, troubleshooting, communication.</text>
    </g>

    <!-- Row 5: Operations -->
    <g>
      <rect x="94" y="702" width="912" height="80" rx="14" fill="#ffffff" stroke="#d9e2ec" stroke-width="1.8"/>
      <circle cx="139" cy="742" r="25" fill="#edf8f4" stroke="#d8efe7" stroke-width="1.5" filter="url(#smallShadow)"/>
      <!-- operations pulse / monitor -->
      <g fill="none" stroke="#0f766e" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
        <rect x="122" y="726" width="34" height="26" rx="4"/>
        <path d="M132 760h14"/>
        <path d="M139 752v8"/>
        <path d="M128 740h7l4-7 6 15 4-8h5"/>
      </g>
      <text x="184" y="750" font-size="26" font-weight="800" fill="#17202a">Operations</text>
      <text x="430" y="750" font-size="22" fill="#17202a">Monitoring, automation, recovery, upkeep.</text>
    </g>
  </g>
</svg>
